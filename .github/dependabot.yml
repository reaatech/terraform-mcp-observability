version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    versioning-strategy: increase
    ignore:
      - dependency-type: "all"
        update-types: ["version-update:semver-minor"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "reaatech"
