name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm validate

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugins-${{ runner.os }}-${{ hashFiles('.terraform.lock.hcl') }}

      - name: Root module init + plan (syntax validation only)
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache
        run: |
          cat > ci-providers.tf <<'EOF'
          provider "aws" {
            region                       = "us-east-1"
            access_key                   = "testing"
            secret_key                   = "testing"
            skip_credentials_validation  = true
            skip_region_validation       = true
            skip_requesting_account_id   = true
          }
          EOF
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          terraform init -backend=false
          terraform plan \
            -var="cluster_name=ci-test" \
            -var="region=us-east-1" \
            -var="trace_backend=none" \
            -var="enable_alerting=false" \
            -var="enable_logging=false" \
            -var="enable_metrics=false" \
            -var="enable_traces=false" \
            -input=false \
            -detailed-exitcode
