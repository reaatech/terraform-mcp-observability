# Standalone reference config — not consumed by Terraform.
# Use this as a starting point for AWS Managed Prometheus metrics export.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector-self
          scrape_interval: 30s
          static_configs:
            - targets: [localhost:8888]
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
        metrics:
          system.disk.io:
            enabled: true
      load: {}
      network: {}

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - key: environment
        value: ${ENV}
        action: upsert
      - key: cluster
        value: ${CLUSTER_NAME}
        action: upsert
      - key: service.namespace
        value: mcp-observability
        action: upsert
  attributes/amp:
    actions:
      - key: "aws.amp.workspace_id"
        value: ${AMP_WORKSPACE_ID}
        action: upsert

exporters:
  prometheusremotewrite:
    endpoint: ${AMP_REMOTE_WRITE_ENDPOINT}
    auth:
      authenticator: sigv4auth
    resource_to_telemetry_conversion:
      enabled: true
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  prometheus:
    endpoint: 0.0.0.0:8888
  sigv4auth:
    region: ${AWS_REGION:-us-east-1}
    service: aps

service:
  extensions: [health_check, pprof, prometheus, sigv4auth]
  pipelines:
    metrics:
      receivers: [otlp, prometheus, hostmetrics]
      processors: [memory_limiter, batch, resource, attributes/amp]
      exporters: [prometheusremotewrite]
